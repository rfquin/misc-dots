# Set master key to M-x
unbind M-b
set-option -g prefix M-x
bind-key M-x send-prefix 

# Bind Mtrl-1 to switch to window 1, Ctrl-2 to window 2, etc.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Remap split-window bindings
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind % 

set -g allow-passthrough on

bind r source-file ~/.tmux.conf

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# start windows numbering at 1
set -g base-index 1 

set -s set-clipboard on

set-window-option -g mode-keys vi

bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'

# tmux2k
set -g @tmux2k-theme 'gruvbox'
set -g @tmux2k-icons-only true

run '~/.tmux/plugins/tpm/tpm'
