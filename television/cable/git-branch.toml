[metadata]
name = "git-branch"
description = "A channel to select from git branches"
requirements = ["git"]

[source]
command = "git --no-pager branch --all --format=\"%(refname:short)\""
output = "{split: :0}"

[keybindings]
enter = ["actions:edit", "open_entry"]

[preview]
command = "git show -p --stat --pretty=fuller --color=always '{0}'"
